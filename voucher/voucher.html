            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNavDropdown">

    <h2 class="title">🎁 KHO VOUCHER</h2>

    <div class="voucher-grid">
      <div class="voucher" data-discount="10">
        <img src="img/voucher.png" />
        <div class="info">
          <h3>GIẢM 10%</h3>
          <p>Còn <span class="qty">2</span> lượt</p>
          <button class="btn-apply">ÁP DỤNG</button>
        </div>
      </div>

      <div class="voucher" data-discount="15">
        <img src="img/voucher.png" />
        <div class="info">
          <h3>GIẢM 15%</h3>
          <p>Còn <span class="qty">2</span> lượt</p>
          <button class="btn-apply">ÁP DỤNG</button>
        </div>
      </div>

      <div class="voucher" data-discount="20">
        <img src="img/voucher.png" />
        <div class="info">
          <h3>GIẢM 20%</h3>
          <p>Còn <span class="qty">2</span> lượt</p>
          <button class="btn-apply">ÁP DỤNG</button>
        </div>
      </div>

      <div class="voucher" data-discount="25">
        <img src="img/voucher.png" />
        <div class="info">
          <h3>GIẢM 25%</h3>
          <p>Còn <span class="qty">2</span> lượt</p>
          <button class="btn-apply">ÁP DỤNG</button>
        </div>
      </div>

      <div class="voucher" data-discount="30">
        <img src="img/voucher.png" />
        <div class="info">
          <h3>GIẢM 30%</h3>
          <p>Còn <span class="qty">2</span> lượt</p>
          <button class="btn-apply">ÁP DỤNG</button>
        </div>
      </div>

      <div class="voucher" data-discount="40">
        <img src="img/voucher.png" />
        <div class="info">
          <h3>GIẢM 40%</h3>
          <p>Còn <span class="qty">2</span> lượt</p>
          <!-- <button onclick="applyVoucher(this)">ÁP DỤNG</button> -->
          <button class="btn-apply">ÁP DỤNG</button>
        </div>
      </div>
    </div>

    <!-- ĐỔI ĐIỂM -->
    <div class="exchange-box">
      <h3>🍔 Đổi Burger Point</h3>

      <p>
        Bạn đang có:
        <span id="current-points">0</span> điểm
      </p>

      <p class="exchange-note">10 🍔 = 1 lượt voucher</p>

      <div class="exchange-buttons">
        <button class="exchange-btn" data-voucher="10">Đổi voucher 10%</button>

        <button class="exchange-btn" data-voucher="15">Đổi voucher 15%</button>

        <button class="exchange-btn" data-voucher="20">Đổi voucher 20%</button>

        <button class="exchange-btn" data-voucher="25">Đổi voucher 25%</button>

        <button class="exchange-btn" data-voucher="30">Đổi voucher 30%</button>

        <button class="exchange-btn" data-voucher="40">Đổi voucher 40%</button>
      </div>
    </div>
